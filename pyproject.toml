[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tomlstack"]

[project]
name = "tomlstack"
version = "0.1.0"
description = "TOML configuration loader with include/merge/interpolation"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = ["pytest"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
